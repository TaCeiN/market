<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorHub — Вход</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav id="navbar"></nav>

  <div class="auth-card">
    <h1 id="auth-title" class="auth-card__title">Вход</h1>
    <p id="auth-subtitle" class="auth-card__subtitle">Добро пожаловать в MentorHub</p>

    <button id="google-btn" class="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Войти через Google
    </button>

    <div class="auth-card__divider"><span>или</span></div>

    <form id="auth-form">
      <div id="full-name-group" class="form-group" style="display: none;">
        <label for="full_name">Полное имя</label>
        <input type="text" id="full_name" name="full_name" placeholder="Иван Иванов" required>
      </div>

      <div id="role-group" class="form-group" style="display: none;">
        <label for="role">Я хочу быть</label>
        <select id="role" name="role" required>
          <option value="">Выберите роль</option>
          <option value="student">Учеником</option>
          <option value="mentor">Ментором</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required minlength="6">
      </div>

      <button type="submit" id="auth-submit" class="btn btn--primary" style="width: 100%;">Войти</button>
    </form>

    <div id="auth-toggle" class="auth-card__toggle">
      Нет аккаунта? <a href="login.html?mode=register">Зарегистрироваться</a>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAuthForm();
    });
  </script>
</body>
</html>
