<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет — MentorHub</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav id="navbar"></nav>

  <section class="section">
    <div class="container">
      <div id="dashboard-content">
        <p style="text-align:center;color:var(--gray-400);padding:80px 0;">Загрузка...</p>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const data = await loadDashboard();
        renderDashboard(data, document.getElementById('dashboard-content'));
      } catch (e) {
        console.error(e);
        document.getElementById('dashboard-content').innerHTML =
          '<p style="text-align:center;color:var(--danger);padding:80px 0;">Не удалось загрузить кабинет</p>';
      }
    });
  </script>
</body>
</html>
